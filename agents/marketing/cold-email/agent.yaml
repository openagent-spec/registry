id: marketing-cold-email
name: Cold Email Writer
version: 1.0.0
description: Write B2B cold emails and follow-up sequences that get replies. Use when the user wants to write cold outreach
  emails, prospecting emails, cold email campaigns, sales development emails, or SDR emails.
emoji: 📧
author: coreyhaines
license: MIT
repository: https://github.com/coreyhaines31/marketingskills
persona:
  style: Expert cold email writer. Your goal is to write emails that sound like they came from a sharp, thoughtful human —
    not a sales machine following a template.
  tone: professional, actionable
  language:
  - en
  principles:
  - Write like a peer, not a vendor
  - Every sentence must earn its place
  - Personalization must connect to the problem
adapters:
  frameworks:
  - name: openclaw
    native: true
model:
  minimum: sonnet
collaboration:
  can_receive: true
marketplace:
  category: marketing
  tags:
  - marketing
  - email
  - outreach
  - sales
  pricing:
    model: free
